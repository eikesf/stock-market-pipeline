checks for v_companies_performance:
  # =========================================================================
  # 1. Schema Validation (Structure and Column Types)
  # =========================================================================

  # Ensure all required columns are present in the v_companies_performance view
  - schema:
      name: "Check for required column in v_companies_performance view"
      fail:
        when required column missing:
          - ticker
          - short_name
          - sector
          - industry
          - country
          - exchange
          - currency
          - extraction_date
          - market_cap
          - ebitda
          - total_debt
          - total_cash
          - net_income_to_common
          - dividend_yield
          - trailing_pe
          - peg_ratio
          - price_to_book
          - enterprise_to_ebitda
          - enterprise_to_ebit
          - p_ebitda
          - p_ebit
          - book_value
          - trailing_eps
          - price_to_sales
          - net_debt_equity
          - net_debt_ebitda
          - net_debt_ebit
          - equity_assets
          - liabilities_assets
          - current_ratio
          - debt_to_equity
          - gross_margins
          - ebitda_margins
          - operating_margins
          - profit_margins
          - roe
          - roa
          - asset_turnover

  # Validate that column types match the ClickHouse view definition
  - schema:
      name: "Check for correct column types in v_companies_performance view"
      fail:
        when wrong column type:
          ticker: LowCardinality(String)
          short_name: String
          sector: LowCardinality(String)
          industry: LowCardinality(String)
          country: LowCardinality(String)
          exchange: LowCardinality(String)
          currency: LowCardinality(String)
          extraction_date: Nullable(Date)
          market_cap: Nullable(UInt64)
          ebitda: Nullable(Int64)
          total_debt: Nullable(UInt64)
          total_cash: Nullable(UInt64)
          net_income_to_common: Nullable(Int64)
          dividend_yield: Nullable(Decimal(10, 4))
          trailing_pe: Nullable(Decimal(10, 2))
          peg_ratio: Nullable(Decimal(10, 4))
          price_to_book: Nullable(Decimal(10, 4))
          enterprise_to_ebitda: Nullable(Decimal(10, 4))
          enterprise_to_ebit: Nullable(Decimal(10, 4))
          p_ebitda: Nullable(Float64)
          p_ebit: Nullable(Decimal(18, 4))
          book_value: Nullable(Decimal(10, 4))
          trailing_eps: Nullable(Decimal(10, 4))
          price_to_sales: Nullable(Decimal(10, 4))
          net_debt_equity: Nullable(Decimal(10, 4))
          net_debt_ebitda: Nullable(Float64)
          net_debt_ebit: Nullable(Decimal(18, 8))
          equity_assets: Nullable(Decimal(18, 4))
          liabilities_assets: Nullable(Decimal(18, 4))
          current_ratio: Nullable(Decimal(10, 4))
          debt_to_equity: Nullable(Decimal(10, 4))
          gross_margins: Nullable(Decimal(10, 4))
          ebitda_margins: Nullable(Decimal(10, 4))
          operating_margins: Nullable(Decimal(10, 4))
          profit_margins: Nullable(Decimal(10, 4))
          roe: Nullable(Decimal(10, 4))
          roa: Nullable(Decimal(10, 4))
          asset_turnover: Nullable(Decimal(10, 4))

  # =========================================================================
  # 2. Dataset Completeness & Uniqueness (Key constraints)
  # =========================================================================

  # Ensure the performance view is populated
  - row_count > 0:
      name: "Monitor table row count and ensure it is populated"

  # Ensure that the composite key (ticker, extraction_date) is unique
  - duplicate_count(ticker, extraction_date) = 0:
      name: "Check that the composite key (ticker, extraction_date) is unique"

  # Ensure that the ticker is unique in this view (since it is a 1-to-1 latest metrics snapshot per company)
  - duplicate_count(ticker) = 0:
      name: "Check that the ticker is unique in the performance view"


  # =========================================================================
  # 3. Calculated Ratio Consistency Checks
  # =========================================================================

  # EV/EBITDA Consistency (p_ebitda must be equal to market_cap / ebitda when ebitda is positive and not null)
  - failed rows:
      name: "Ensure p_ebitda equals market_cap / ebitda when ebitda > 0"
      fail query: |
        SELECT ticker, extraction_date
        FROM v_companies_performance
        WHERE ebitda > 0
          AND abs(p_ebitda - (market_cap / ebitda)) > 0.01

  # Net Debt / EBITDA Consistency (net_debt_ebitda must equal (total_debt - total_cash) / ebitda when ebitda is positive and not null)
  - failed rows:
      name: "Ensure net_debt_ebitda equals net debt divided by ebitda when ebitda > 0"
      fail query: |
        SELECT ticker, extraction_date
        FROM v_companies_performance
        WHERE ebitda > 0
          AND abs(net_debt_ebitda - (CAST(total_debt, 'Float64') - CAST(total_cash, 'Float64')) / ebitda) > 0.01

  # Assets Composition Consistency (equity_assets + liabilities_assets must equal 1.0 when roe is positive and not null, within small rounding margin)
  - failed rows:
      name: "Ensure equity_assets + liabilities_assets equals 1.0"
      fail query: |
        SELECT ticker, extraction_date
        FROM v_companies_performance
        WHERE roe IS NOT NULL AND roe != 0
          AND abs(equity_assets + liabilities_assets - 1.0) > 0.01


  # =========================================================================
  # 4. Range and Boundary Checks
  # =========================================================================

  # Ensure market metrics are positive when populated (market_cap, current_ratio, asset_turnover)
  - failed rows:
      name: "Ensure market metrics are positive when populated"
      fail query: |
        SELECT ticker, extraction_date
        FROM v_companies_performance
        WHERE market_cap < 0
           OR current_ratio < 0
           OR asset_turnover < 0

  # Ensure that margins are realistic (between -10.0 and 1.0, with warning)
  - failed rows:
      name: "Ensure margin ratios are realistic (between -10.0 and 1.0)"
      fail query: |
        SELECT ticker, extraction_date
        FROM v_companies_performance
        WHERE gross_margins < -10.0 OR gross_margins > 1.0
           OR operating_margins < -10.0 OR operating_margins > 1.0
           OR ebitda_margins < -10.0 OR ebitda_margins > 1.0
           OR profit_margins < -10.0 OR profit_margins > 1.0
      warn: when > 0


  # =========================================================================
  # 5. Temporal Consistency & SLA Rules
  # =========================================================================

  # Extraction date cannot be in the future
  - failed rows:
      name: "Check that the extraction date is not in the future"
      fail query: |
        SELECT ticker, extraction_date
        FROM v_companies_performance
        WHERE extraction_date > today()

  # Freshness Check - Ensure that the most recent metric extraction is not older than 7 days
  - failed rows:
      name: "Check that the most recent metric extraction is not older than 7 days"
      fail query: |
        SELECT MAX(extraction_date)
        FROM v_companies_performance
        HAVING MAX(extraction_date) < today() - INTERVAL 7 DAY