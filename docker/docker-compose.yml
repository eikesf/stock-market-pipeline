name: stock_market_pipeline

services:

  airflow_postgres:
    image: postgres:18-alpine
    container_name: airflow_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${AIRFLOW_DB_USER}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - POSTGRES_DB=${AIRFLOW_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - stream-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow_init:
    image: stock-pipeline:latest
    container_name: airflow_init
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/config:/opt/airflow/config
      - ../airflow/logs:/opt/airflow/logs
      - ../src:/opt/airflow/dags/src
      - ../.env:/opt/airflow/.env
      - ../data:/opt/airflow/data
    env_file:
      - ../.env
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow_postgres:5432/${AIRFLOW_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - DATA_DIR=/opt/airflow/data
    depends_on:
      airflow_postgres:
        condition: service_healthy
    networks:
      - stream-network
    command: bash -c "airflow db migrate && airflow users create --username $${AIRFLOW_ADMIN_USER} --firstname $${AIRFLOW_ADMIN_FIRSTNAME} --lastname $${AIRFLOW_ADMIN_LASTNAME} --role Admin --email $${AIRFLOW_ADMIN_EMAIL} --password $${AIRFLOW_ADMIN_PASSWORD} && (airflow connections list | grep -q 'clickhouse_default' || airflow connections add clickhouse_default --conn-type generic --conn-host $${CLICKHOUSE_HOST:-clickhouse} --conn-login $${CLICKHOUSE_USER:-finance_admin} --conn-password '$${CLICKHOUSE_PASSWORD:-FinanceStock2026*}' --conn-port $${CLICKHOUSE_PORT:-8123} --conn-schema $${CLICKHOUSE_DB:-stock_market}) && (airflow pools list | grep -q 'spark_write_pool' || airflow pools set spark_write_pool 1 'Serializes Spark writes to prevent Delta Lake filesystem conflicts')"

  airflow_apiserver:
    image: stock-pipeline:latest
    container_name: airflow_apiserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/config:/opt/airflow/config
      - ../airflow/logs:/opt/airflow/logs
      - ../src:/opt/airflow/dags/src
      - ../.env:/opt/airflow/.env
      - ../data:/opt/airflow/data
    env_file:
      - ../.env
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow_postgres:5432/${AIRFLOW_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow_apiserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_JWT_SECRET}
      - DATA_DIR=/opt/airflow/data
    depends_on:
      airflow_postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
    networks:
      - stream-network
    command: airflow api-server

  airflow_scheduler:
    image: stock-pipeline:latest
    container_name: airflow_scheduler
    restart: unless-stopped
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/config:/opt/airflow/config
      - ../airflow/logs:/opt/airflow/logs
      - ../src:/opt/airflow/dags/src
      - ../.env:/opt/airflow/.env
      - ../data:/opt/airflow/data
    env_file:
      - ../.env
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow_postgres:5432/${AIRFLOW_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow_apiserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_JWT_SECRET}
      - DATA_DIR=/opt/airflow/data
    depends_on:
      airflow_postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
    networks:
      - stream-network
    command: airflow scheduler

  airflow_dag_processor:
    image: stock-pipeline:latest
    container_name: airflow_dag_processor
    restart: unless-stopped
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/config:/opt/airflow/config
      - ../airflow/logs:/opt/airflow/logs
      - ../src:/opt/airflow/dags/src
      - ../.env:/opt/airflow/.env
      - ../data:/opt/airflow/data
    env_file:
      - ../.env
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow_postgres:5432/${AIRFLOW_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow_apiserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_JWT_SECRET}
      - DATA_DIR=/opt/airflow/data
    depends_on:
      airflow_postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
    networks:
      - stream-network
    command: airflow dag-processor

  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    container_name: stock_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123" # HTTP interface (BI tools / browser)
      - "9000:9000" # Native TCP interface (clickhouse-connect)
    env_file:
      - ../.env
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - chdata:/var/lib/clickhouse
      - ../src/db_init:/docker-entrypoint-initdb.d
    networks:
      - stream-network
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --user='${CLICKHOUSE_USER}' --password='${CLICKHOUSE_PASSWORD}' --query='SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  python:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      target: builder
    image: stock-pipeline:latest
    container_name: python_finance
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../:/app
      - /app/.venv
      - ../data:/data
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - stream-network
    command: tail -f /dev/null

networks:
  stream-network:
    driver: bridge

volumes:
  chdata:
  postgres_data:
